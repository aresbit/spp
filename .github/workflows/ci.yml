name: ci

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang and make
        run: |
          sudo apt-get update
          sudo apt-get install -y clang make

      - name: Run tests
        run: make test

  bench-gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: async
            cases: async_pool
          - group: containers
            cases: concurrency_map_vec
          - group: io
            cases: io_files,io_lock,io_net

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang and make
        run: |
          sudo apt-get update
          sudo apt-get install -y clang make

      - name: Run grouped benchmark regression gate
        run: ./tools/bench_check.sh --cases "${{ matrix.cases }}" --current-out "bench/current-${{ matrix.group }}.tsv"

      - name: Upload grouped benchmark snapshot
        uses: actions/upload-artifact@v4
        with:
          name: bench-current-${{ matrix.group }}
          path: bench/current-${{ matrix.group }}.tsv
