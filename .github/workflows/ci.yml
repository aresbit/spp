name: ci

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test-and-bench-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang and make
        run: |
          sudo apt-get update
          sudo apt-get install -y clang make

      - name: Run tests
        run: make test

      - name: Run benchmark regression gate
        run: make bench-check
